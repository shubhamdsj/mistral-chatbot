<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mistral Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            background: white;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
        }
        .chat-header {
            background: #f97316;
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
            font-size: 18px;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }
        .user-message {
            background: #f97316;
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        button {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #ea6c0a;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 Mistral Chatbot</div>
        <div class="chat-messages" id="messages">
            <div class="message bot-message">
                Hi! I am your Mistral AI assistant (Made by SHUBHAM MISHRA). How can I help you today?
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const messages = document.getElementById("messages");
            const userText = input.value.trim();

            if (!userText) return;

            // Show user message
            messages.innerHTML += `
                <div class="message user-message">${userText}</div>
            `;
            input.value = "";

            // Show loading
            messages.innerHTML += `
                <div class="message bot-message" id="loading">Thinking...</div>
            `;
            messages.scrollTop = messages.scrollHeight;

            // Send to backend
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText })
            });

            const data = await response.json();

            // Remove loading and show reply
            document.getElementById("loading").remove();
            messages.innerHTML += `
                <div class="message bot-message">${data.reply}</div>
            `;
            messages.scrollTop = messages.scrollHeight;
        }

        // Send message on Enter key
        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
